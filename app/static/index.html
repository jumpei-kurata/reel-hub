<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Reel Hub</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --primary: #6c5ce7;
      --text: #ffffff;
      --sub: #888888;
      --success: #00b894;
      --error: #e17055;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      padding-bottom: calc(64px + var(--safe-bottom));
    }
    header {
      position: sticky; top: 0;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      padding-top: calc(14px + var(--safe-top));
      display: flex; align-items: center; justify-content: space-between;
      z-index: 100;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .indicator { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--sub); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
    .dot.on { background: var(--success); }
    main { padding: 16px; max-width: 480px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 14px; }
    label { display: block; font-size: 11px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
    input[type=url], textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 16px; padding: 13px 14px; outline: none;
      transition: border-color .2s; -webkit-appearance: none; font-family: inherit;
    }
    input[type=url]:focus, textarea:focus { border-color: var(--primary); }
    textarea { min-height: 90px; resize: vertical; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 15px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity .15s, transform .1s; -webkit-tap-highlight-color: transparent;
    }
    .btn:active:not(:disabled) { transform: scale(0.97); opacity: 0.9; }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .btn-primary { background: var(--primary); color: #fff; margin-top: 12px; }
    .btn-post { background: #1877f2; color: #fff; }
    .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 4px 0 14px; color: var(--sub); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .upload-area {
      border: 2px dashed var(--border); border-radius: 10px; padding: 24px 16px;
      text-align: center; cursor: pointer; transition: border-color .2s;
    }
    .upload-area:hover, .upload-area.dragover { border-color: var(--primary); }
    .upload-area input { display: none; }
    .upload-area p { font-size: 14px; color: var(--sub); margin-top: 6px; }
    video { width: 100%; border-radius: 10px; max-height: 380px; background: #000; display: block; }
    .hidden { display: none !important; }
    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card); border-top: 1px solid var(--border);
      padding: 12px 20px; padding-bottom: calc(12px + var(--safe-bottom));
      text-align: center; font-size: 13px; color: var(--sub); z-index: 100;
      transition: color .3s;
    }
    footer.loading { color: var(--primary); }
    footer.error   { color: var(--error); }
    footer.success { color: var(--success); }
    .spin {
      display: inline-block; width: 14px; height: 14px; vertical-align: middle; margin-right: 5px;
      border: 2px solid rgba(108,92,231,.3); border-top-color: var(--primary);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<header>
  <div class="logo">🎬 Reel Hub</div>
  <div class="indicator"><span class="dot" id="dot-fb"></span>Facebook</div>
</header>

<main>
  <div class="card">
    <label>Instagram URL</label>
    <input type="url" id="url" placeholder="https://www.instagram.com/reel/..."
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="btn btn-primary" id="btn-dl" onclick="startDownload()">ダウンロード</button>
  </div>

  <div class="divider">または</div>

  <div class="card">
    <label>動画ファイルをアップロード</label>
    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="handleDrop(event)">
      <input type="file" id="file-input" accept="video/mp4,video/quicktime,.mp4,.mov,.m4v" onchange="uploadFile(this.files[0])">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>タップして選択 / ドラッグ&ドロップ</p>
    </div>
  </div>

  <div id="section-result" class="hidden">
    <div class="card">
      <label>プレビュー</label>
      <video id="preview" controls playsinline></video>
    </div>

    <div class="card">
      <label>キャプション / ハッシュタグ</label>
      <textarea id="caption"></textarea>
      <div class="actions">
        <button class="btn btn-post" id="btn-post" onclick="postAndSave()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          Facebookに投稿 & カメラロールに保存
        </button>
        <p style="font-size:11px;color:var(--sub);text-align:center;margin-top:-4px">共有シートが開いたら「ビデオを保存」をタップ</p>
      </div>
    </div>
  </div>
</main>

<footer id="status">準備完了</footer>

<script>
  let videoId = null;

  async function checkStatus() {
    try {
      const d = await fetch('/auth/status').then(r => r.json());
      document.getElementById('dot-fb').classList.toggle('on', d.facebook_configured);
    } catch {}
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.className = type;
    el.innerHTML = type === 'loading' ? `<span class="spin"></span>${msg}` : msg;
  }

  async function startDownload() {
    const url = document.getElementById('url').value.trim();
    if (!url) { setStatus('URLを入力してください', 'error'); return; }
    document.getElementById('btn-dl').disabled = true;
    setStatus('ダウンロード中...', 'loading');
    try {
      const res = await fetch('/api/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
      if (!res.ok) throw new Error((await res.json()).detail);
      const data = await res.json();
      videoId = data.video_id;
      document.getElementById('preview').src = `/api/video/${videoId}`;
      document.getElementById('section-result').classList.remove('hidden');
      document.getElementById('section-result').scrollIntoView({ behavior: 'smooth' });
      setStatus('ダウンロード完了 ✓', 'success');
    } catch (e) {
      setStatus(e.message, 'error');
    } finally {
      document.getElementById('btn-dl').disabled = false;
    }
  }

  function handleDrop(event) {
    event.preventDefault();
    document.getElementById('upload-area').classList.remove('dragover');
    const file = event.dataTransfer.files[0];
    if (file) uploadFile(file);
  }

  async function uploadFile(file) {
    if (!file) return;
    setStatus('アップロード中...', 'loading');
    const formData = new FormData();
    formData.append('file', file);
    try {
      const res = await fetch('/api/upload', { method: 'POST', body: formData });
      if (!res.ok) throw new Error((await res.json()).detail);
      const data = await res.json();
      videoId = data.video_id;
      document.getElementById('preview').src = `/api/video/${videoId}`;
      document.getElementById('section-result').classList.remove('hidden');
      document.getElementById('section-result').scrollIntoView({ behavior: 'smooth' });
      setStatus('アップロード完了 ✓', 'success');
    } catch (e) {
      setStatus(e.message, 'error');
    }
    document.getElementById('file-input').value = '';
  }

  async function postAndSave() {
    if (!videoId) return;
    const caption = document.getElementById('caption').value;
    const btn = document.getElementById('btn-post');
    btn.disabled = true;

    // Step1: 保存（共有シートが閉じるまで待つ）
    if (navigator.share) {
      try {
        setStatus('動画を準備中...', 'loading');
        const res = await fetch(`/api/video/${videoId}`);
        const blob = await res.blob();
        const file = new File([blob], 'video.mp4', { type: 'video/mp4' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file] });
        }
      } catch (e) {
        if (e.name !== 'AbortError') {
          const a = document.createElement('a');
          a.href = `/api/video/${videoId}?download=true`;
          a.download = 'video.mp4';
          a.click();
        }
      }
    } else {
      const a = document.createElement('a');
      a.href = `/api/video/${videoId}?download=true`;
      a.download = 'video.mp4';
      a.click();
    }

    // Step2: 共有シートが閉じた後、iOSのネットワーク再開を待ってからFacebook投稿
    await new Promise(r => setTimeout(r, 600));
    setStatus('Facebookに投稿中...', 'loading');
    try {
      const res = await fetch('/api/facebook/post', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ video_id: videoId, message: caption }),
      });
      if (!res.ok) throw new Error((await res.json()).detail);
      setStatus('Facebook投稿完了 & カメラロール保存済み ✓', 'success');
    } catch (e) {
      if (e.message === 'Load failed' || e.message === 'Failed to fetch' || e.message === 'NetworkError') {
        setStatus('Facebook投稿完了（ネットワーク応答なし・Facebookで確認してください）', 'success');
      } else {
        setStatus(`Facebookエラー: ${e.message}`, 'error');
      }
    }

    btn.disabled = false;
  }

  const DEFAULT_CAPTION = '\n\n#ダンス #ブレイクダンス #dance #breakdance #';
  document.getElementById('caption').value = DEFAULT_CAPTION;

  document.getElementById('url').addEventListener('keydown', e => {
    if (e.key === 'Enter') startDownload();
  });

  checkStatus();
</script>
</body>
</html>
