<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Insights · Reel Hub</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --primary: #6c5ce7;
      --text: #ffffff;
      --sub: #888888;
      --success: #00b894;
      --error: #e17055;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      padding-bottom: calc(40px + var(--safe-bottom));
    }
    header {
      position: sticky; top: 0;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      padding-top: calc(14px + var(--safe-top));
      display: flex; align-items: center; justify-content: space-between;
      z-index: 100;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .sort-select {
      background: var(--bg); color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 10px; font-size: 13px; font-family: inherit;
      -webkit-appearance: none; appearance: none;
    }
    main { padding: 16px; max-width: 560px; margin: 0 auto; }
    .auth-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 16px; margin-bottom: 14px;
    }
    label { display: block; font-size: 11px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
    .row { display: flex; gap: 10px; }
    input[type=password], input[type=number] {
      flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 14px; padding: 11px 12px; outline: none;
      -webkit-appearance: none; font-family: inherit;
    }
    input[type=number] { max-width: 80px; }
    input:focus { border-color: var(--primary); }
    .btn {
      padding: 11px 18px; border: none; border-radius: 10px; background: var(--primary); color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.85; }
    .post {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 14px; margin-bottom: 12px; display: flex; gap: 12px;
    }
    .thumb {
      width: 92px; height: 92px; border-radius: 10px; flex-shrink: 0;
      background: var(--bg); overflow: hidden; position: relative;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb .badge {
      position: absolute; top: 4px; left: 4px;
      background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.4px;
    }
    .info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .date { font-size: 11px; color: var(--sub); }
    .open { font-size: 11px; color: var(--primary); text-decoration: none; }
    .caption { font-size: 13px; line-height: 1.4; color: var(--text); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: auto; }
    .metric { display: flex; flex-direction: column; gap: 1px; }
    .metric .v { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.1; }
    .metric .k { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.4px; }
    .error-note {
      grid-column: 1 / -1; font-size: 10px; color: var(--error); margin-top: 4px;
    }
    .empty { color: var(--sub); text-align: center; padding: 40px 16px; font-size: 14px; }
    .spin {
      display: inline-block; width: 14px; height: 14px; vertical-align: middle; margin-right: 6px;
      border: 2px solid rgba(108,92,231,.3); border-top-color: var(--primary);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<header>
  <div class="logo">📊 Insights</div>
  <select class="sort-select" id="sort">
    <option value="views">📺 再生数順</option>
    <option value="reach">🎯 リーチ順</option>
    <option value="likes">❤️ いいね順</option>
    <option value="comments">💬 コメント順</option>
    <option value="saved">🔖 保存順</option>
    <option value="shares">↗️ シェア順</option>
    <option value="timestamp">🕒 新しい順</option>
  </select>
</header>

<main>
  <div class="auth-card" id="auth">
    <label>REFRESH_SECRET</label>
    <div class="row">
      <input type="password" id="secret" placeholder="64文字のhex" autocomplete="off">
      <input type="number" id="limit" value="10" min="1" max="25">
      <button class="btn" id="load">Load</button>
    </div>
  </div>

  <div id="content"></div>
</main>

<script>
  const $ = (id) => document.getElementById(id);
  const STORAGE_KEY = 'reel_hub_insights_secret';
  let currentData = null;

  function fmtNum(n) {
    if (n == null) return '–';
    if (n >= 10000) return (n / 1000).toFixed(1) + 'k';
    return String(n);
  }
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return 'たった今';
    if (diff < 3600) return Math.floor(diff / 60) + '分前';
    if (diff < 86400) return Math.floor(diff / 3600) + '時間前';
    if (diff < 86400 * 30) return Math.floor(diff / 86400) + '日前';
    return d.toLocaleDateString('ja-JP');
  }
  function escapeHtml(s) {
    return (s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function render() {
    if (!currentData) return;
    const sortKey = $('sort').value;
    const items = [...currentData.media];
    items.sort((a, b) => {
      if (sortKey === 'timestamp') {
        return new Date(b.timestamp || 0) - new Date(a.timestamp || 0);
      }
      return (b.insights?.[sortKey] ?? 0) - (a.insights?.[sortKey] ?? 0);
    });

    if (items.length === 0) {
      $('content').innerHTML = '<div class="empty">投稿がありません</div>';
      return;
    }

    $('content').innerHTML = items.map((m) => {
      const ins = m.insights || {};
      const err = ins._error;
      return `
        <article class="post">
          <div class="thumb">
            ${m.thumbnail_url ? `<img src="${escapeHtml(m.thumbnail_url)}" loading="lazy" alt="">` : ''}
            <span class="badge">${escapeHtml(m.type || '')}</span>
          </div>
          <div class="info">
            <div class="meta">
              <span class="date">${escapeHtml(fmtDate(m.timestamp))}</span>
              ${m.permalink ? `<a class="open" href="${escapeHtml(m.permalink)}" target="_blank" rel="noopener">開く ↗</a>` : ''}
            </div>
            <div class="caption">${escapeHtml(m.caption) || '<span style="color:var(--sub)">(無題)</span>'}</div>
            <div class="metrics">
              <div class="metric"><span class="v">${fmtNum(ins.views)}</span><span class="k">📺 再生</span></div>
              <div class="metric"><span class="v">${fmtNum(ins.reach)}</span><span class="k">🎯 リーチ</span></div>
              <div class="metric"><span class="v">${fmtNum(ins.likes)}</span><span class="k">❤️ いいね</span></div>
              <div class="metric"><span class="v">${fmtNum(ins.comments)}</span><span class="k">💬 コメント</span></div>
              <div class="metric"><span class="v">${fmtNum(ins.saved)}</span><span class="k">🔖 保存</span></div>
              <div class="metric"><span class="v">${fmtNum(ins.shares)}</span><span class="k">↗️ シェア</span></div>
              ${err ? `<div class="error-note">⚠ ${escapeHtml(err)}</div>` : ''}
            </div>
          </div>
        </article>
      `;
    }).join('');
  }

  async function load() {
    const secret = $('secret').value.trim();
    const limit = Math.max(1, Math.min(25, parseInt($('limit').value || '10', 10)));
    if (!secret) {
      $('content').innerHTML = '<div class="empty">REFRESH_SECRETを入力してください</div>';
      return;
    }
    localStorage.setItem(STORAGE_KEY, secret);
    $('content').innerHTML = '<div class="empty"><span class="spin"></span>取得中…</div>';
    try {
      const r = await fetch(`/api/insights?secret=${encodeURIComponent(secret)}&limit=${limit}`);
      if (!r.ok) {
        const errBody = await r.json().catch(() => ({}));
        $('content').innerHTML = `<div class="empty" style="color:var(--error)">HTTP ${r.status}: ${escapeHtml(errBody.detail || r.statusText)}</div>`;
        return;
      }
      currentData = await r.json();
      render();
    } catch (e) {
      $('content').innerHTML = `<div class="empty" style="color:var(--error)">取得失敗: ${escapeHtml(e.message)}</div>`;
    }
  }

  $('load').addEventListener('click', load);
  $('secret').addEventListener('keydown', (e) => { if (e.key === 'Enter') load(); });
  $('sort').addEventListener('change', render);

  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    $('secret').value = stored;
    load();
  }
</script>
</body>
</html>
